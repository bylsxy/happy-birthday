<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陈一诺，生日快乐</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- 背景照片墙 (CSS 实现滤镜色调跟飘落效果) -->
    <div class="background-wall" id="bg-wall">
        <!-- 动态生成的照片占位符 -->
    </div>

    <!-- 第一部分：开场信封/弹窗 -->
    <div id="welcome-screen" class="screen active">
        <div class="envelope-container" id="envelope">
            <div class="envelope">
                <div class="flap"></div>
                <div class="body"></div>
                <div class="heart">❤️</div>
            </div>
            <p class="hint-text">点击开启专属于你的惊喜</p>
        </div>

        <!-- 祝贺信内容 (初始隐藏) -->
        <div class="letter-modal" id="letter">
            <div class="letter-content">
                <h2>给妹妹的一封信 ✉️</h2>
                <p>陈一诺生日快乐！🎂（还有元宵节快乐）</p>
                <p>PS:这是个前后端交互项目测试</p>
                <p>既然来了，不如看看下面有什么好东西</p>
                <button class="btn-primary" id="btn-enter">去看看</button>
            </div>
        </div>
    </div>

    <!-- 第二部分：主页 (礼物滑动窗) -->
    <div id="main-screen" class="screen hidden">
        <header>
            <h1>猜你喜欢 ✨</h1>
            <p>挑选一份你的专属礼物吧</p>
        </header>

        <div class="gift-showcase" id="gift-list">
            <!-- 礼物列表将在此处由 JS 动态生成 -->
        </div>

        <div class="custom-gift-section">
            <button class="btn-secondary" id="btn-custom-gift">没有我喜欢的，自行输入（自选）</button>
            <br><br>
            <button class="btn-primary" id="btn-finish" style="width: auto; padding: 12px 40px;">挑选完毕，前往下一步</button>
        </div>
    </div>

    <!-- 第三部分：最终结束界面 -->
    <div id="final-screen" class="screen hidden">
        <div class="letter-modal show"
            style="transform: translate(0, 0) scale(1); position: relative; left: auto; top: auto; width: 90%;">
            <div class="letter-content">
                <h2>如果没有BUG的话已经收到信号啦 💌</h2>
                <p>礼物会慢慢准备好，敬请期待哦~</p>
                <p style="text-align: center; font-size: 2rem; margin-top: 20px;">❤️</p>
                <button class="btn-secondary" id="btn-gallery" style="margin-top: 20px; width: 100%;">查看我们的专属回忆</button>
            </div>
        </div>
    </div>

    <!-- 第四部分：照片画廊界面 -->
    <div id="gallery-screen" class="screen hidden" style="justify-content: flex-start; overflow-y: auto;">
        <header style="padding-top:40px; text-align:center; width: 100%;">
            <h1>专属回忆 🎞️</h1>
            <p style="color:var(--secondary-color);">那些闪闪发光的瞬间</p>
        </header>
        <div class="gallery-container" id="gallery-container">
            <!-- Photos will be dynamically added here -->
        </div>
        <button class="btn-primary" id="btn-back-to-home"
            style="width: auto; padding: 12px 40px; margin: 30px auto; display: block; flex-shrink: 0;">回到首页</button>
    </div>

    <!-- 弹窗：自定义礼物输入 -->
    <div class="modal-overlay hidden" id="custom-modal">
        <div class="modal">
            <h3>告诉我要什么</h3>
            <textarea id="custom-input" placeholder="输入你想要的礼物..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" id="btn-cancel-custom">取消</button>
                <button class="btn-primary" id="btn-submit-custom">确定</button>
            </div>
        </div>
    </div>

    <!-- 弹窗：确认选择 -->
    <div class="modal-overlay hidden" id="confirm-modal">
        <div class="modal">
            <h3>确定选择吗？</h3>
            <p id="confirm-gift-name">礼物名称</p>
            <div class="modal-actions">
                <button class="btn-cancel" id="btn-cancel-confirm">再看看</button>
                <button class="btn-primary" id="btn-submit-confirm">确定</button>
            </div>
        </div>
    </div>

    <!-- 提示框 -->
    <div class="toast hidden" id="toast">
        礼物需求已经发至1832652154@qq.com！
    </div>

    <!-- Confetti JS for effects -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
